name: CI/CD to AWS EC2

on:
  push:
    branches: [ "main" ] # main 브랜치에 push될 때 자동 실행

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Java 17 설정 (Spring Boot 4.x)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Node.js 설정 (Vite + React 빌드용)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 4. Spring Boot 백엔드 빌드 (테스트 생략)
      - name: Create Firebase Config File
        shell: bash
        run: |
          mkdir -p ./backend/src/main/resources
          cat <<EOF > ./backend/src/main/resources/firebase-service-account.json
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          EOF
          # 파일 생성 확인 (내용은 보안상 출력하지 않음)
          ls -l ./backend/src/main/resources/firebase-service-account.json

      - name: Build Backend (Spring Boot)
        working-directory: ./backend
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -x test

      # 5. React 프론트엔드 빌드 (Vite)
      - name: Build Frontend (React + Vite)
        working-directory: ./frontend-web
        env:
          VITE_KAKAO_API_KEY: ${{ secrets.VITE_KAKAO_API_KEY }}
        run: |
          npm ci
          npm run build
          tar -czvf dist.tar.gz dist/

      # 6. 백엔드 JAR 파일 EC2로 전송
      - name: Copy Backend JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend/build/libs/backend-0.0.1-SNAPSHOT.jar"
          target: "/home/ubuntu/bandi/"
          strip_components: 3  # backend/build/libs/ 경로 제거하고 파일만 전송

      # 7. 프론트엔드 빌드 결과물(압축) EC2로 전송
      - name: Copy Frontend Build to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "frontend-web/dist.tar.gz"
          target: "/home/ubuntu/bandi/"
          strip_components: 1

      # 8. EC2에서 배포 스크립트 실행
      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e  # 오류 발생 시 배포 즉시 중단 (로그에서 원인 파악 가능)

            echo "===== 프론트엔드 배포 시작 ====="
            cd /home/ubuntu/bandi
            if [ ! -f "dist.tar.gz" ]; then
                echo "ERROR: dist.tar.gz 파일이 전송되지 않았습니다! SCP 작업을 확인하세요."
                exit 1
            fi

            # 기존 dist 폴더가 있다면 삭제 후 압축 해제
            rm -rf dist
            tar -xzvf dist.tar.gz

            # Nginx 경로로 완벽하게 이동
            sudo rm -rf /var/www/html/*
            sudo cp -r dist/* /var/www/html/
            
            sudo chown -R www-data:www-data /var/www/html
            sudo systemctl reload nginx
            echo "프론트엔드 배포 완료!"

            echo "===== 백엔드 배포 시작 ====="
            APP_PID_FILE="/home/ubuntu/bandi/app.pid"

            # PID 파일로 기존 프로세스 종료
            if [ -f "$APP_PID_FILE" ]; then
                OLD_PID=$(cat "$APP_PID_FILE")
                echo "기존 프로세스(PID: $OLD_PID) 종료 중..."
                kill -15 "$OLD_PID"
                sleep 5
                rm -f "$APP_PID_FILE"
                echo "프로세스 종료 완료"
            else
                echo "실행 중인 백엔드 프로세스 없음 (PID 파일 없음)"
            fi

            # 새 Spring Boot 프로세스 시작
            echo "새 버전 백엔드 시작..."
            nohup java -Dspring.profiles.active=prod -jar /home/ubuntu/bandi/backend-0.0.1-SNAPSHOT.jar > /home/ubuntu/bandi/app.log 2>&1 &
            NEW_PID=$!
            echo $NEW_PID > "$APP_PID_FILE"
            disown $NEW_PID
            echo "새 프로세스 시작됨 (PID: $NEW_PID)"

            echo "===== 배포 완료! ====="
            exit 0
