spring:
  application:
    name: bandi-backend
  profiles:
    active: local # 기본값은 로컬로 설정
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/bandi?sslmode=disable
    username: ${DB_USERNAME:postgres}
    password: admin0325
    driver-class-name: org.postgresql.Driver
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com.bandi.backend: DEBUG

---
spring:
  config:
    activate:
      on-profile: local
server:
  port: 8084 # 로컬에서도 8084 사용 (8080 충돌 방지 및 프록시 설정 일치)
kakao:
  client-id: b7b74bba84f701122fa1bacf9697f578
  redirect-uri: http://127.0.0.1:5173/auth/kakao/callback

---
spring:
  config:
    activate:
      on-profile: prod
server:
  port: 8084 # 서버(운영)에서는 8084 사용
kakao:
  client-id: b7b74bba84f701122fa1bacf9697f578
  redirect-uri: https://www.bandicon.kr/auth/kakao/callback
